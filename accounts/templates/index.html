<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PP-Hub</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap");
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }
      body {
        position: relative;
        height: 100vh;
        margin: 0;
        overflow: hidden;
      }
      .bg-image {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: url("https://ecdn.dhakatribune.net/contents/cache/images/900x505x1/uploads/media/2023/10/12/ulab-0e9b6264ad67e2ff6151708f6b3688bd.jpg?jadewits_media_id=6568")
          no-repeat center center/cover;
        filter: blur(7px);
        z-index: -1;
      }
      .bg-image::after {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.5); /* Dark overlay */
}
      .nav-custom {
        background: #4a98f7;
        padding: 15px 50px;
      }
      .nav-custom .logo {
        font-size: 30px;
        font-weight: bold;
        color: white;
        text-decoration: none;
        font-family: Cambria, Cochin, Georgia, Times, "Times New Roman", serif;
      }
      .nav-links {
        list-style: none;
        display: flex;
        justify-content: center;
        gap: 20px;
        padding: 0;
        margin: 0;
      }
      .nav-links a {
        color: white;
        font-weight: 500;
        text-decoration: none;
        transition: all 0.3s ease-in-out;
      }
      .nav-links a:hover {
        text-decoration: none;
      }
      .search-box input {
        border: none;
        padding: 8px 10px;
        border-radius: 5px;
        width: 200px;
        outline: none;
      }
      .search-box i {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        color: #4a98f7;
      }
      .center-content {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        color: #fff;
      }
      .center-content h1 {
        font-size: 40px;
        margin-bottom: 10px;
      }
      .main-search-box {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        background: white;
        padding: 10px;
        border-radius: 20px;
      }
      .main-search-box input {
        padding: 8px;
        border: none;
        outline: none;
        width: 250px;

      }
      .main-search-box button {
        padding: 8px 15px;
        border: none;
        background: #4a98f7;
        color: #fcfafa;
        cursor: pointer;
        border-radius: 15px;
      }
      .main-search-box button:hover {
        background: #357acb;
      }
    </style>
  </head>
  <body>
    <div class="bg-image"></div>
    <nav class="nav-custom d-flex align-items-center justify-content-between">
      <a href="#" class="logo">PP-Hub</a>
      <ul class="nav-links d-flex">
        <li><a href="{% url 'home' %}">Home</a></li>
        <li><a href="#">Upload</a></li>
        <li><a href="#">Download</a></li>
        <li><a href="{% url 'login' %}">Sign in</a></li>
        <li><a href="#">Contact Us</a></li>
      </ul>
      <div class="search-box">
        <input type="text" placeholder="Search here...">
    </div>
    </nav>
    <div class="center-content">
      <h1>Welcome to PP-Hub</h1>
      <p>Find and share files easily</p>
      <div class="main-search-box">
        <i class="fas fa-search"></i>
        <input type="text" placeholder="Search files..." />
        <button>Search</button>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
